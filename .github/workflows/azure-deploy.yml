# This mirrors the workflow Azure auto-generates when you connect GitHub in
# the "Deployment" tab of the Web App creation wizard (OIDC / user-assigned
# identity auth — no publish-profile secret), with the frontend build steps
# added in. Once Azure generates its own version of this file, just replace:
#   1. AZURE_WEBAPP_NAME below with your real App Service name
#   2. The three secrets.AZUREAPPSERVICE_*_<...> names in the "Login to Azure"
#      step with whatever Azure actually named them (they'll already exist as
#      repo secrets — Azure creates them for you, nothing to fill in manually)

name: Build and deploy Python app to Azure Web App

"on":
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: your-app-service-name # TODO: set this to your App Service name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Embed frontend build into backend (served as static files by FastAPI)
        run: |
          rm -rf backend/app/static
          mkdir -p backend/app/static
          cp -r frontend/dist/. backend/app/static/

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        working-directory: backend
        run: zip -r ../release.zip . -x "venv/*" -x "data/*.db" -x "data/mock_excel/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_XXXXXXXXXXXXXXXXXXXXXXXXXXXX }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_XXXXXXXXXXXXXXXXXXXXXXXXXXXX }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_XXXXXXXXXXXXXXXXXXXXXXXXXXXX }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: "Production"
